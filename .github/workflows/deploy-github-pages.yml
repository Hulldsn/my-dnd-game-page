# 将 webapp 构建结果发布到 GitHub Pages
# 使用前：仓库 Settings → Pages → Build and deployment → Source 选「GitHub Actions」

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 注册 Pages 站点并写入并发元数据；缺少时 deploy 可能 404
      - uses: actions/configure-pages@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Install & build
        working-directory: webapp
        env:
          # 项目站：https://<owner>.github.io/<仓库名>/
          BASE_PATH: /${{ github.event.repository.name }}/
        run: |
          npm ci
          npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: webapp/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
